services:
  dn-notification:
    container_name: dn-notification
    # Pre-built image. The CLI's `update` command wipes this image and
    # pulls a fresh copy to guarantee the new release is in use.
    image: digitalneetwork/dn-notification:latest
    restart: always
    # The container runs as root. docker-entrypoint.sh creates and
    # chowns the two subdirs under $DATA_DIR (session, logs)
    # at every startup, so the bind-mount works correctly whether the
    # host path is fresh, pre-populated, or owned by a different user.
    # No `user:` override is needed.
    env_file:
      - .env
    environment:
      # DATA_DIR is the single source of truth for persistent storage.
      # Session and logs are derived from it in the app — no
      # need to set SESSION_DIR / LOGS_DIR here.
      - DATA_DIR=/var/lib/dn-notification
      - PYTHONUNBUFFERED=1
    ports:
      # Configurable: change the host port in .env (HOST_PORT) or override here.
      - "${HOST_PORT:-8000}:8000"
    volumes:
      # One bind-mount covers EVERYTHING that must survive container
      # recreation, image rebuilds, and upgrades:
      #   /var/lib/dn-notification/session/   -> /var/lib/dn-notification/session/
      #   /var/lib/dn-notification/logs/      -> /var/lib/dn-notification/logs/
      - /var/lib/dn-notification:/var/lib/dn-notification
    # The image already declares a HEALTHCHECK; this just makes `docker ps`
    # surface the status nicely.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # json-file log driver with rotation so `docker compose logs` works
    # and the host log volume doesn't grow unbounded.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    init: false
