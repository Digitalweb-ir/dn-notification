name: Version + Release

# This workflow has two responsibilities, deliberately kept small:
#
# 1. Verify the version. On every push (and PR) to main, run
#    `./version_bump.sh --check` to make sure VERSION reflects the work
#    done since the last version tag. Fails the build otherwise. The
#    developer is expected to land the bump in the same commit as the
#    change that caused it (via the local commit-msg hook), so by the
#    time CI sees the commit, the bump is already part of it.
#
# 2. Release. On a `v*.*.*` tag push, build the Docker image and push it
#    with the tag as the image tag (e.g. tag v1.2.4 -> image
#    digitalneetwork/dn-notification:1.2.4 plus an update of the
#    floating `:latest` if the tag is on main). Tags are created
#    locally with `git tag vX.Y.Z && git push --tags`. CI never creates
#    or moves a tag — the tag is the source of truth, and a CI-created
#    tag would be the same kind of "hidden state on GitHub" that this
#    workflow was rewritten to avoid.
#
# Previous behaviour (auto-commit a `chore(release): bump to …` on
# every push to main) is intentionally removed. It left VERSION
# inconsistent with the developer's local copy until they pulled, and
# made the version bump a detached follow-up commit unrelated to the
# change that caused it.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-version:
    name: Verify VERSION matches commits
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          # Full history so version_bump.sh can scan commits since the
          # last version tag.
          fetch-depth: 0

      - name: Make version_bump.sh executable
        run: chmod +x ./version_bump.sh

      - name: Show VERSION and the implied bump
        run: |
          echo "VERSION file:"
          cat VERSION
          echo
          ./version_bump.sh --print

      - name: Verify VERSION matches the implied bump
        run: ./version_bump.sh --check

  build-and-push:
    name: Build & push Docker image
    # Only run on tag pushes. `branches-ignore: ['*']` ensures we never
    # trigger on a plain branch push — image builds are reserved for
    # explicit releases.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from the tag
        id: meta
        run: |
          version=${GITHUB_REF#refs/tags/v}
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Building digitalneetwork/dn-notification:${version}"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            digitalneetwork/dn-notification:${{ steps.meta.outputs.version }}
            digitalneetwork/dn-notification:latest
          cache-from: type=registry,ref=digitalneetwork/dn-notification:buildcache
          cache-to:   type=registry,ref=digitalneetwork/dn-notification:buildcache,mode=max
