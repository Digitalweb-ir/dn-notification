name: Bump VERSION

# Bumps the project VERSION file based on Conventional Commits keywords
# (break / feat / fix) since the last version tag, then mirrors the new
# version into app/__init__.py. Runs on every push to main.
#
# Extend this workflow (build, publish, release) by adding steps after the
# bump. The bumped VERSION file is committed back to the repo by a follow-up
# workflow step (e.g. peter-evans/enable-pull-request-automerge or a
# dedicated `git-auto-commit` action).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          # Need full history so version_bump.sh can scan commits since the
          # last version tag.
          fetch-depth: 0

      - name: Make version_bump.sh executable
        run: chmod +x ./version_bump.sh

      - name: Print the version that would be applied
        id: preview
        run: ./version_bump.sh --print

      - name: Bump VERSION and sync __version__
        run: ./version_bump.sh

      - name: Show the resulting VERSION
        run: cat VERSION

      - name: Commit the bump (if anything changed)
        run: |
          if ! git diff --quiet; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add VERSION app/__init__.py
            git commit -m "chore(release): bump to $(cat VERSION)"
            git push
          else
            echo "No version change — nothing to commit."
          fi
