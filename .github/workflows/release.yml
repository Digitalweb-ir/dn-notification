name: Release

# This workflow is the single release pipeline for the project. It is
# driven by semantic-release, which is invoked via `npx semantic-release`
# from CI (per the official semantic-release recommendation: do not
# install semantic-release as a project dependency).
#
# semantic-release@25 requires Node `^22.14.0 || >=24.10.0` (its
# `engines` field). We pin Node 22 in the runner and let npx fetch
# the pinned major of semantic-release + the @semantic-release/exec
# plugin on demand, so the project does not need a package-lock.json
# and there is nothing in the repo for npm to drift out of sync with.
#
# Triggers:
#   - push to main:    run the full pipeline. semantic-release analyzes
#                      the commits since the last release tag, picks
#                      the next version, runs @semantic-release/exec's
#                      `successCmd` to publish the version to
#                      $GITHUB_ENV / $GITHUB_OUTPUT, tags the commit,
#                      creates the GitHub Release, and the downstream
#                      `docker` job consumes the version via
#                      `needs.release.outputs.version` and builds +
#                      publishes the multi-arch image.
#   - pull_request:    semantic-release runs in --dry-run mode and only
#                      logs the version that *would* be released. No
#                      commits, no tags, no Docker push.
#   - workflow_dispatch:  manual release of the current main HEAD.
#
# Version propagation across jobs
# --------------------------------
# The `release` job exposes two outputs:
#   * `released` — "true" if a new release was published, "false"
#     otherwise. The `docker` job is gated on this so it only runs
#     when there is actually something to build.
#   * `version`  — the semver string of the release (e.g. "1.4.2").
#     The `docker` job reads this and passes it as the
#     APP_VERSION build-arg and the OCI org.opencontainers.image.version
#     label.
#
# This is the version-propagation pattern recommended by the
# semantic-release docs and the @semantic-release/exec README:
# the version is produced by semantic-release and consumed in the
# same workflow run via job outputs. No `git describe` anywhere,
# no GitHub API round-trip, no on-disk VERSION file in the repo.
# If a future maintainer forks the project, this is the only file
# that needs to know about the image tag — there is no second
# source of truth to keep in sync.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Concurrency: never run two release pipelines against main at the
# same time. semantic-release is not transactional — a tag gets
# pushed before the GitHub Release is created, so two concurrent
# runs can race on the same release commit. cancel-in-progress:
# false because we want a queued run to wait for the in-flight one
# to finish (rather than be cancelled mid-tag).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "uvicorn[standard]==0.30.6"

      - name: Import smoke test
        # Exercises app/__init__.py's __version__ resolution paths
        # (APP_VERSION env var + git describe fallback). The
        # APP_VERSION env var is unset here, so the import should
        # print the git-describe output of the checked-out commit.
        run: |
          python -c "from app import __version__; print('app version:', __version__)"


  release:
    name: semantic-release
    # Only run on direct pushes to main. Pull requests use the
    # separate release-dry-run job, and workflow_dispatch reuses
    # this one.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    # Expose two outputs to downstream jobs:
    #   - version:  the released semver, e.g. "1.4.2"
    #   - released: "true" if a release was actually published,
    #                "false" otherwise (so the docker job can
    #                skip when there are no qualifying commits).
    outputs:
      version:  ${{ steps.publish-version.outputs.version }}
      released: ${{ steps.publish-version.outputs.released }}
    permissions:
      # semantic-release pushes a release commit and a tag, and creates
      # a GitHub Release. `contents: write` is required for the push;
      # `issues: write` and `pull-requests: write` are required so the
      # @semantic-release/github plugin can comment on issues/PRs that
      # the release closes.
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          # semantic-release needs the full history to compute "commits
          # since the last release tag". `persist-credentials: false`
          # ensures the workflow re-authenticates with GH_TOKEN below
          # instead of reusing the checkout's bundled credential helper.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # semantic-release@25's `engines` field requires
          # `^22.14.0 || >=24.10.0`. Pin to 22 LTS.
          node-version: '22'

      - name: Configure git for the release commit
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Run semantic-release
        id: semantic-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Disable npm publish (we have no package to publish; the
          # project is private Python).
          NPM_TOKEN: ""
        # `npx --package` installs each listed package into npx's
        # scratch directory and then runs the final command. Pinning
        # the major of semantic-release and exec avoids breaking the
        # pipeline when upstream ships a new major.
        #
        # @semantic-release/exec is back in the dependency list (after
        # we removed it in a previous revision): its `successCmd` is
        # what publishes RELEASE_VERSION into $GITHUB_ENV, which the
        # next step propagates to a job output.
        run: npx --package semantic-release@25 --package @semantic-release/exec@6 -- semantic-release

      - name: Publish the released version to job outputs
        id: publish-version
        if: always()
        # Runs after semantic-release regardless of whether a release
        # was actually published. If a release was published, the
        # successCmd step (configured in release.config.cjs) will have
        # set RELEASE_VERSION in $GITHUB_ENV; we forward it to a job
        # output here. If no release was published (no qualifying
        # commits), RELEASE_VERSION is unset, the conditional in the
        # `if` below keeps `version` empty, and the docker job skips
        # itself on the `released` flag.
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          if [[ -n "${RELEASE_VERSION:-}" ]]; then
            {
              echo "version=${RELEASE_VERSION}"
              echo "released=true"
            } >> "$GITHUB_OUTPUT"
            echo "Published release version: ${RELEASE_VERSION}"
          else
            {
              echo "version="
              echo "released=false"
            } >> "$GITHUB_OUTPUT"
            echo "No release was published (no qualifying commits). The docker job will be skipped."
          fi

  release-dry-run:
    name: semantic-release (dry-run)
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # semantic-release@25's `engines` field requires
          # `^22.14.0 || >=24.10.0`. Pin to 22 LTS.
          node-version: '22'

      - name: Run semantic-release in dry-run mode
        env:
          # A read-only token is sufficient for dry-run. The default
          # GITHUB_TOKEN has read access, so we use it directly.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --package semantic-release@25 -- semantic-release --dry-run

  docker:
    name: Build & push Docker image
    # Two gates, in order:
    #   1. Only on direct pushes to main. (PRs go through
    #      release-dry-run instead.)
    #   2. Only if the `release` job actually published a new
    #      release. The `released` output is "false" when
    #      semantic-release had no qualifying commits, in which
    #      case there is nothing new to build.
    if: |
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && needs.release.outputs.released == 'true'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          # The docker job does not need the tag in the local clone
          # — the version comes from needs.release.outputs.version,
          # not from `git describe`. A shallow clone is fine.
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          # DOCKERHUB_TOKEN is an access token (not the account password) —
          # Docker Hub's recommended credential type for CI.
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        uses: docker/metadata-action@v5
        with:
          # The release version (from semantic-release's job output)
          # is the only fixed source of truth for the image tags.
          # The :latest tag is a convenience alias, but the
          # versioned tag is the one the CLI's update flow reads
          # to know what is currently installed.
          images: digitalneetwork/dn-notification
          tags: |
            type=raw,value={{env.RELEASE_VERSION}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.version={{env.RELEASE_VERSION}}
            org.opencontainers.image.title=dn-notification
            org.opencontainers.image.source=https://github.com/Digitalweb-ir/dn-notification
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          # APP_VERSION is read by app/__init__.py at import time.
          # The OCI image.version label is set by metadata-action
          # above and stamped on the image by buildx. Both come
          # from the same job output of the `release` job, which
          # received it from semantic-release's successCmd.
          build-args: |
            VERSION=${{ needs.release.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=digitalneetwork/dn-notification:buildcache
          cache-to:   type=registry,ref=digitalneetwork/dn-notification:buildcache,mode=max
