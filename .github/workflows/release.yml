name: Release

# This workflow is the single release pipeline for the project. It is
# driven by semantic-release, which is invoked via `npx semantic-release`
# from CI (per the official semantic-release recommendation: do not
# install semantic-release as a project dependency).
#
# semantic-release@25 requires Node `^22.14.0 || >=24.10.0` (its
# `engines` field). We pin Node 22 in the runner and let npx fetch
# the pinned major of semantic-release + the @semantic-release/exec
# plugin on demand, so the project does not need a package-lock.json
# and there is nothing in the repo for npm to drift out of sync with.
#
# Triggers:
#   - push to main:    run the full pipeline. semantic-release analyzes
#                      the commits since the last release tag, picks the
#                      next version, writes it to VERSION and
#                      app/__init__.py, creates the release commit + tag
#                      + GitHub Release, and the downstream `docker` job
#                      builds and publishes the multi-arch image.
#   - pull_request:    semantic-release runs in --dry-run mode and only
#                      logs the version that *would* be released. No
#                      commits, no tags, no Docker push.
#   - workflow_dispatch:  manual release of the current main HEAD.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "uvicorn[standard]==0.30.6"

      - name: Import smoke test
        run: |
          python -c "from app import __version__; print('app version:', __version__)"


  release:
    name: semantic-release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      # semantic-release pushes a release commit and a tag, and creates
      # a GitHub Release. `contents: write` is required for the push;
      # `issues: write` and `pull-requests: write` are required so the
      # @semantic-release/github plugin can comment on issues/PRs that
      # the release closes.
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          # semantic-release needs the full history to compute "commits
          # since the last release tag". `persist-credentials: false`
          # ensures the workflow re-authenticates with GH_TOKEN below
          # instead of reusing the checkout's bundled credential helper.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # semantic-release@25's `engines` field requires
          # `^22.14.0 || >=24.10.0`. Pin to 22 LTS.
          node-version: '22'

      - name: Configure git for the release commit
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Disable npm publish (we have no package to publish; the
          # project is private Python).
          NPM_TOKEN: ""
        # `npx --package` installs each listed package into npx's
        # scratch directory and then runs the final command. Pinning
        # the major of semantic-release avoids breaking the pipeline
        # when upstream ships a new major. We no longer need
        # @semantic-release/exec here: the previous setup used it to
        # invoke write-version.sh, which has been removed.
        run: npx --package semantic-release@25 -- semantic-release

  release-dry-run:
    name: semantic-release (dry-run)
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # semantic-release@25's `engines` field requires
          # `^22.14.0 || >=24.10.0`. Pin to 22 LTS.
          node-version: '22'

      - name: Run semantic-release in dry-run mode
        env:
          # A read-only token is sufficient for dry-run. The default
          # GITHUB_TOKEN has read access, so we use it directly.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --package semantic-release@25 -- semantic-release --dry-run

  docker:
    name: Build & push Docker image
    # Only run on pushes to main AND only after semantic-release has
    # finished. The tag semantic-release just cut is the version we
    # bake into the image as the APP_VERSION build-arg and the
    # org.opencontainers.image.version OCI label.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          # The docker job needs the tag semantic-release just created
          # to compute the version. fetch-depth: 0 is the simplest way
          # to guarantee the tag is in the local clone.
          fetch-depth: 0

      - name: Resolve the release version
        id: version
        # The release job cut a tag of the form vX.Y.Z. We need X.Y.Z
        # for the Dockerfile's APP_VERSION build-arg and the OCI
        # image.version label. We get it from the most recent tag
        # reachable from HEAD — semantic-release guarantees that is
        # the release it just published. A plain semver check on the
        # stripped tag protects against an unexpected tag shape (e.g.
        # a maintainer-pushed hotfix tag with a non-semver name).
        run: |
          raw=$(git describe --tags --abbrev=0 HEAD)
          version=${raw#v}
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Refusing to build: tag '$raw' is not a valid semver" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building digitalneetwork/dn-notification:${version} + :latest"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          # DOCKERHUB_TOKEN is an access token (not the account password) —
          # Docker Hub's recommended credential type for CI.
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # The release version is the only fixed source of truth for
          # the image tags. The :latest tag is a convenience alias,
          # but the versioned tag is the one the CLI's update flow
          # reads to know what is currently installed.
          images: digitalneetwork/dn-notification
          tags: |
            type=raw,value={{steps.version.outputs.version}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.version={{steps.version.outputs.version}}
            org.opencontainers.image.title=dn-notification
            org.opencontainers.image.source=https://github.com/Digitalweb-ir/dn-notification
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          # APP_VERSION is read by app/__init__.py at import time.
          # The OCI image.version label is set by metadata-action
          # above and stamped on the image by buildx.
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=digitalneetwork/dn-notification:buildcache
          cache-to:   type=registry,ref=digitalneetwork/dn-notification:buildcache,mode=max
