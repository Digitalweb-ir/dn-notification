name: Release

# This workflow is the single release pipeline for the project. It is
# driven by semantic-release, which is invoked via `npx semantic-release`
# from CI (per the official semantic-release recommendation: do not
# install semantic-release as a project dependency).
#
# Triggers:
#   - push to main:    run the full pipeline. semantic-release analyzes
#                      the commits since the last release tag, picks the
#                      next version, writes it to VERSION and
#                      app/__init__.py, creates the release commit + tag
#                      + GitHub Release, and the downstream `docker` job
#                      builds and publishes the multi-arch image.
#   - pull_request:    semantic-release runs in --dry-run mode and only
#                      logs the version that *would* be released. No
#                      commits, no tags, no Docker push.
#   - workflow_dispatch:  manual release of the current main HEAD.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "uvicorn[standard]==0.30.6"

      - name: Import smoke test
        run: |
          python -c "from app import __version__; print('app version:', __version__)"

  release:
    name: semantic-release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      # semantic-release pushes a release commit and a tag, and creates
      # a GitHub Release. `contents: write` is required for the push;
      # `issues: write` and `pull-requests: write` are required so the
      # @semantic-release/github plugin can comment on issues/PRs that
      # the release closes.
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          # semantic-release needs the full history to compute "commits
          # since the last release tag". `persist-credentials: false`
          # ensures the workflow re-authenticates with GH_TOKEN below
          # instead of reusing the checkout's bundled credential helper.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install semantic-release
        run: npm ci

      - name: Configure git for the release commit
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Disable npm publish (we have no package to publish; the
          # project is private Python).
          NPM_TOKEN: ""
        run: npx semantic-release

  release-dry-run:
    name: semantic-release (dry-run)
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install semantic-release
        run: npm ci

      - name: Run semantic-release in dry-run mode
        env:
          # A read-only token is sufficient for dry-run. The default
          # GITHUB_TOKEN has read access, so we use it directly.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release --dry-run

  docker:
    name: Build & push Docker image
    # Only run on pushes to main AND only after semantic-release has
    # finished. The tag published by semantic-release is the version
    # we tag the image with.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          # DOCKERHUB_TOKEN is an access token (not the account password) —
          # Docker Hub's recommended credential type for CI.
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read the version from the latest release tag
        id: meta
        run: |
          # semantic-release has already pushed the vX.Y.Z tag by the
          # time this job runs. The version-without-v is the image tag.
          tag=$(git describe --tags --abbrev=0)
          version=${tag#v}
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=digitalneetwork/dn-notification" >> "$GITHUB_OUTPUT"
          echo "Building digitalneetwork/dn-notification:${version} + :latest"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=registry,ref=digitalneetwork/dn-notification:buildcache
          cache-to:   type=registry,ref=digitalneetwork/dn-notification:buildcache,mode=max
